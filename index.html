<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salomé 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg-dark: #0d0d1a;
            --envelope-color: #ff4d6d;
            --envelope-dark: #c9184a;
            --glass-white: rgba(255, 255, 255, 0.12);
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg-dark);
          /////////////  //inser long cd-ann//////////////
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            perspective: 1000px; /* Necesario para el efecto 3D del mouse */
        }

        /* Fondo Dinámico */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e1e3f 0%, #0d0d1a 100%);
            z-index: -2;
        }

        .glow-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 77, 109, 0.05), transparent);
            z-index: -1;
        }

        /* El Sobre */
        .envelope-wrapper {
            position: relative;
            width: 350px;
            height: 250px;
            z-index: 10;
            transition: transform 0.1s ease-out;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: var(--envelope-dark);
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.5s ease;
        }

        .envelope:hover {
            transform: translateY(-5px) scale(1.02);
        }

        /* Capas del sobre */
        .back-side {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--envelope-dark);
            z-index: 1;
        }

        .front-side {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--envelope-color);
            clip-path: polygon(0 40%, 50% 100%, 100% 40%, 100% 100%, 0 100%);
            z-index: 4;
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.2);
        }

        .lid {
            position: absolute;
            width: 100%; height: 100%;
            background: var(--envelope-color);
            clip-path: polygon(0 0, 100% 0, 50% 60%);
            z-index: 5;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* La Carta Glassmorphism */
        .letter-glass {
            position: absolute;
            width: 90%;
            height: 90%;
            left: 5%;
            top: 5%;
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 25px;
            box-sizing: border-box;
            z-index: 3;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
            opacity: 0.5;
            overflow-y: auto;
        }

        .letter-title {
            font-family: 'Dancing Script', cursive;
            color: #fff;
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            text-align: center;
        }

        .letter-text {
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 300;
            text-align: center;
        }

        /* Estado Abierto */
        .open .lid {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .open .letter-glass {
            transform: translateY(-170px) scale(1.15);
            opacity: 1;
            z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        /* Partículas Premium */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        @keyframes rise {
            0% { transform: translateY(0) rotate(0deg) scale(0); opacity: 0; }
            20% { opacity: 1; transform: scale(1); }
            100% { transform: translateY(-100vh) rotate(360deg) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="stars-container"></div>
    <div class="glow-overlay"></div>

    <div class="envelope-wrapper animate__animated animate__fadeIn">
        <div class="envelope" onclick="toggleEnvelope()">
            <div class="lid"></div> 
            <div class="back-side"></div> 
            <div class="letter-glass" id="letter">
                <h2 class="letter-title">Para Salomé 💕</h2>
                <div id="mensaje" class="letter-text"></div>
            </div>
            <div class="front-side"></div> 
        </div>
    </div>

    <script>
        let isOpened = false;

        function toggleEnvelope() {
            const envelope = document.querySelector('.envelope');
            if (!isOpened) {
                envelope.classList.add('open');
                isOpened = true;
                // Pequeña espera para que la carta suba antes de empezar a escribir
                setTimeout(escribirMensaje, 800);
            }
        }

        function escribirMensaje() {
            const texto = "Hola Salomé, quiero que sepas que estás bien guapa y que..... quiero verte ya, y que no te fresees cuando te diga que vayamos allá donde no quisiste ir ❤️";
            const elemento = document.getElementById("mensaje");
            
            let i = 0;
            function type() {
                if (i < texto.length) {
                    elemento.innerHTML += texto.charAt(i);
                    i++;
                    setTimeout(type, 45);
                } else {
                    createMagic();
                }
            }
            type();
        }

        function createMagic() {
            // Generar corazones y brillos
            setInterval(() => {
                createParticle("❤️");
                createParticle("😏");
                createParticle("🫦");
            }, 400);
        }

        function createParticle(symbol) {
            const p = document.createElement("div");
            p.className = "particle";
            p.innerHTML = symbol;
            p.style.left = Math.random() * 100 + "vw";
            p.style.bottom = "0";
            p.style.fontSize = (Math.random() * 20 + 15) + "px";
            p.style.animation = `rise ${Math.random() * 3 + 3}s ease-out forwards`;
            
            document.body.appendChild(p);
            
            // Eliminar del DOM después de la animación
            setTimeout(() => p.remove(), 5000);
        }

        // Parallax suave con el movimiento del mouse
        document.addEventListener("mousemove", (e) => {
            if (!isOpened) { // Solo mover si no se ha abierto para no molestar la lectura
                const x = (window.innerWidth / 2 - e.pageX) / 30;
                const y = (window.innerHeight / 2 - e.pageY) / 30;
                document.querySelector('.envelope-wrapper').style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
            }
        });
    </script>
</body>
</html>
